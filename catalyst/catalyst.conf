# S3RLINUX Catalyst Configuration
# RAVE ALL NIGHT 🌈💀
# Main catalyst config - put this at /etc/catalyst/catalyst.conf

# Directory where catalyst stores its files
storedir="/var/tmp/catalyst"

# Directory for distfiles (downloaded source tarballs)
distdir="/var/cache/distfiles"

# Directory for portage snapshots
portdir="/var/db/repos/gentoo"

# Number of jobs for parallel compilation
# Set to your CPU thread count
jobs="16"

# Load average limit
# Generally set to same as jobs
load-average="16"

# Hash function for checksums
hash_function="sha512"

# Compression format for stage tarballs
compressor_arch_map = {
    "amd64" = "lz4"
}

# Use squashfs for the live environment (if building ISO)
# squashfs_portage="yes"

# Enable verbose output
# verbose="yes"

# Snapshot compression
snapshot_compression_mode="lz4"
