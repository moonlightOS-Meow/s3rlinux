name: SPOILER-ALERT 🗡️

on:
  issues:
    types: [opened, labeled]

jobs:
  spoiler-alert:
    runs-on: ubuntu-latest
    steps:
      - name: SPOILER ALERT
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            
            // Chaos responses
            const responses = [
              "⚠️ SPOILER ALERT! This issue has been registered in the Foundation database. All personnel to stations! 🗡️",
              "📝 Issue #${issue.number} received. VERIL approves. Might controls everything. 💪",
              "🎵 This issue is now LEGALLY REQUIRED TO LISTEN TO S3RL. 174 BPM OR BEWARE. 🎶",
              "🗿 MUAHAHAHAHA! Another mortal dares to file an issue! The Foundation acknowledges your concern... and denies it. 🏳️",
              "⚠️ CONTAINMENT PROTOCOL: Issue #${issue.number} - Subject claims to have found a bug. Testing for plot relevance. 🤡",
              "😴 We were told not to fix bugs. We were told to embrace the chaos. Issue #${issue.number} noted. 🌀",
              "📦 S3RLINUX accepts your issue. We will look at it. Eventually. Maybe. Between DMC meme compilations. 💀"
            ];
            
            const random = responses[Math.floor(Math.random() * responses.length)];
            
            // Add chaotic comment
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: random + '\n\n---\n*This comment was generated by the S3RLINUX Foundation Bot. You are legally required to listen to S3RL.*'
            });
            
            // Add labels if not present
            if (!labels.includes('credo-classified')) {
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['credo-classified', 'devils-trigger']
              });
            }
